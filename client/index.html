<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- SEO Meta Tags -->

    <meta name="author" content="The Bedouins" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thebedouins.com/" />
    <meta property="og:title" content="The Bedouins - Production House | AI Video & Creative Studio" />
    <meta property="og:description" content="The Bedouins is a creative production house specializing in AI-driven video production, animation, sound design, and storytelling." />
    <meta property="og:image" content="/images/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thebedouins.com/" />
    <meta property="twitter:title" content="The Bedouins - Production House | AI Video & Creative Studio" />
    <meta property="twitter:description" content="The Bedouins is a creative production house specializing in AI-driven video production, animation, sound design, and storytelling." />
    <meta property="twitter:image" content="/images/logo.png" />

    <link rel="icon" type="image/png" href="/images/favicon-camel.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <!-- Hidden Lemon Slice Widget Container -->
    <style>
      /* Aggressively hide the default minimize button AND the entire header if possible */
      lemon-slice-widget::part(minimize-button),
      lemon-slice-widget::part(launcher),
      lemon-slice-widget::part(header) {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
      }
      
      /* Container to strictly control visibility */
      #widget-container {
        position: fixed;
        bottom: 0;
        right: 0;
        z-index: 40;
        visibility: hidden;
        pointer-events: none;
      }

      /* 
       * CUSTOM EXTERNAL CLOSE BUTTON
       * This button sits OUTSIDE the widget but visually OVERLAYS the native close button.
       * It gives us 100% control over the close action while hiding the native button.
       */
      #external-close-btn {
        position: absolute;
        top: 15px; /* Position exactly over the native close button */
        right: 15px;
        width: 32px;
        height: 32px;
        background: rgba(0, 0, 0, 0.3); /* Semi-transparent to blend in, or match widget header color */
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10001; /* Above everything */
        pointer-events: auto;
        transition: all 0.2s ease;
        border: none;
        backdrop-filter: blur(4px);
      }

      #external-close-btn:hover {
        background: rgba(0, 0, 0, 0.6);
        transform: scale(1.05);
      }
      
      #widget-container.active {
        visibility: visible;
        pointer-events: auto;
      }

      /* 
       * CRITICAL FIX: Aggressive CSS rule to hide the widget if it EVER becomes small (minimized).
       */
      lemon-slice-widget[state="minimized"],
      lemon-slice-widget[widget-state="minimized"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }
    </style>
    
    <div id="widget-container">
      <!-- Custom External Close Button -->
      <div id="external-close-btn" title="Close Chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </div>

      <lemon-slice-widget 
        id="lemon-widget"
        agent-id="agent_12ff4ade9b737ec7" 
        initial-state="hidden"
        custom-active-width="320" 
        custom-active-height="480"
        controlled-show-minimize-button="false"
        initial-mute="false"
        auto-start-audio="true">
      </lemon-slice-widget>
    </div>

    <!-- Custom Minimal Arrow Tab -->
    <button id="custom-chat-trigger" class="fixed bottom-8 right-0 z-50 flex items-center justify-center bg-[#3abfb5] hover:bg-[#2aa89f] text-white w-10 h-12 rounded-l-lg shadow-lg transition-all duration-300 transform hover:w-12 group border-l border-t border-b border-white/20">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      
      <!-- Tooltip/Popup on Hover -->
      <div class="absolute right-full mr-2 top-1/2 -translate-y-1/2 w-max px-3 py-2 bg-black/90 text-white text-sm rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none border border-[#3abfb5]/30 shadow-xl">
        Chat with AI
        <div class="absolute top-1/2 -translate-y-1/2 -right-1 w-2 h-2 bg-black/90 rotate-45 border-t border-r border-[#3abfb5]/30"></div>
      </div>
    </button>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const widget = document.getElementById('lemon-widget');
        const widgetContainer = document.getElementById('widget-container');
        const triggerBtn = document.getElementById('custom-chat-trigger');
        const closeBtn = document.getElementById('external-close-btn');
        
        if (widget && widgetContainer && triggerBtn && closeBtn) {
          // Function to open widget
          const openWidget = () => {
            // Show container first
            widgetContainer.classList.add('active');
            
            // Activate widget
            widget.setAttribute('controlled-widget-state', 'active');
            
            // UI updates
            triggerBtn.classList.add('translate-x-full', 'opacity-0'); // Hide trigger
            
            // Try to unmute explicitly after a short delay to ensure widget is ready
            setTimeout(() => {
              if (widget.unmute) {
                widget.unmute();
              }
              // Also try setting the attribute again to force update
              widget.setAttribute('initial-mute', 'false');
            }, 500);
          };

          // Function to close widget
          const closeWidget = () => {
            // IMMEDIATELY hide the container - this cuts off the widget visually no matter what state it's in
            widgetContainer.classList.remove('active');
            
            // Tell widget to hide (for internal state)
            widget.setAttribute('controlled-widget-state', 'hidden');

            // Restore the arrow trigger
            triggerBtn.classList.remove('translate-x-full', 'opacity-0'); // Show trigger
          };

          triggerBtn.addEventListener('click', openWidget);
          
          // EXTERNAL CLOSE BUTTON LISTENER
          // This is our primary close mechanism now.
          closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            console.log('External close button clicked');
            closeWidget();
          });

          // Listen for state changes to detect when user clicks the native close/minimize button
          // (Just in case they somehow manage to click it)
          const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
              if (mutation.type === 'attributes' && (mutation.attributeName === 'state' || mutation.attributeName === 'widget-state')) {
                 const newState = widget.getAttribute('state') || widget.getAttribute('widget-state');
                 // If widget tries to minimize (user clicked X), we force full close
                 if (newState === 'minimized' || newState === 'hidden') {
                   closeWidget();
                 }
              }
            });
          });
          
          observer.observe(widget, { attributes: true });

          // NEW: Add a visible custom close button that sits on top of the widget's close button
          // This ensures we have full control over the close action
          const customCloseBtn = document.createElement('div');
          customCloseBtn.innerHTML = '×';
          customCloseBtn.style.position = 'absolute';
          customCloseBtn.style.top = '10px';
          customCloseBtn.style.right = '10px';
          customCloseBtn.style.width = '30px';
          customCloseBtn.style.height = '30px';
          customCloseBtn.style.borderRadius = '50%';
          customCloseBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.5)';
          customCloseBtn.style.color = 'white';
          customCloseBtn.style.display = 'flex';
          customCloseBtn.style.alignItems = 'center';
          customCloseBtn.style.justifyContent = 'center';
          customCloseBtn.style.fontSize = '20px';
          customCloseBtn.style.fontWeight = 'bold';
          customCloseBtn.style.cursor = 'pointer';
          customCloseBtn.style.zIndex = '2147483647'; // Max z-index to be on top of everything
          customCloseBtn.style.pointerEvents = 'auto';
          
          customCloseBtn.addEventListener('click', (e) => {
            console.log('Custom close button clicked - forcing full close');
            e.stopPropagation();
            e.preventDefault();
            closeWidget();
          });
          
          // Only show the custom close button when the widget is expanded
          const updateCloseBtnVisibility = () => {
             const state = widget.getAttribute('state') || widget.getAttribute('widget-state');
             if (state === 'expanded' || state === 'open') {
               customCloseBtn.style.display = 'flex';
             } else {
               customCloseBtn.style.display = 'none';
             }
          };
          
          // Check visibility periodically
          setInterval(updateCloseBtnVisibility, 100);
          
          widgetContainer.appendChild(customCloseBtn);

          // AGGRESSIVE MONITORING: Check if widget size changes (indicating minimization)
          // If it shrinks but isn't hidden, force it to close
          let lastHeight = 0;
          setInterval(() => {
            const rect = widget.getBoundingClientRect();
            // If widget is visible but small (minimized state), close it
            if (widgetContainer.style.display !== 'none' && rect.height > 0 && rect.height < 100) {
               console.log('Widget detected in minimized state - forcing full close');
               closeWidget();
            }
          }, 500);
          
          // Also listen for custom events from the widget
          widget.addEventListener('lemon-slice-widget-state-change', (event) => {
            if (event.detail === 'minimized' || event.detail === 'hidden') {
              closeWidget();
            }
          });

          // Keep the ResizeObserver as a backup
          const resizeObserver = new ResizeObserver((entries) => {
            for (const entry of entries) {
              if (widgetContainer.classList.contains('active')) {
                const height = entry.contentRect.height;
                // If height drops below 300px, it's definitely minimizing -> KILL IT
                if (height > 0 && height < 300) {
                  console.log('Detected physical shrink (minimization), forcing full close');
                  closeWidget();
                }
              }
            }
          });
          
          resizeObserver.observe(widget);
        }
      });
    </script>
    <script type="module" src="https://unpkg.com/@lemonsliceai/lemon-slice-widget"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
